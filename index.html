<body>
    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

/* Navbar */
header{
    background:#222;
    color:#fff;
    padding:15px 40px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

nav h2{
    font-size:28px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

nav ul li a:hover{
    color:orange;
}

/* Hero Section */
.hero{
    background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url("https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: white;
    text-align: center;
    padding: 100px 20px;
}

.hero h1{
    font-size: 50px;
    margin-bottom: 15px;
}

.hero p{
    font-size: 22px;
    margin-bottom: 20px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    background:orange;
    color:white;
    padding:12px 30px;
    text-decoration:none;
    border-radius:5px;
}

.btn:hover{
    background:red;
}

/* Products */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    text-align:center;
    padding:20px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin:15px 0;
}

.price{
    color:red;
    font-size:22px;
    margin-bottom:10px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

/* Footer */
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

/* Responsive */
@media(max-width:768px){

nav{
    flex-direction:column;
}

nav ul{
    flex-direction:column;
    text-align:center;
    margin-top:15px;
}

nav ul li{
    margin:10px 0;
}

.hero h1{
    font-size:32px;
}

}
</style>

</head>
<body>

<header>
<nav>
<h2>ShopNow</h2>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Products</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>
</header>

<section class="hero">
<h1>Welcome to ShopNow</h1>
<p>Latest Fashion & Electronics Collection</p>
<a href="#" class="btn">Shop Now</a>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/250x200" alt="">
<h3>Sports Shoes</h3>
<p class="price">$59</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x200" alt="">
<h3>Smart Watch</h3>
<p class="price">$120</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x200" alt="">
<h3>Headphones</h3>
<p class="price">$45</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x200" alt="">
<h3>Backpack</h3>
<p class="price">$39</p>
<button>Add to Cart</button>
</div>

</section>

<footer>
<p>© 2026 ShopNow | All Rights Reserved</p>
</footer>

</body>
</html>
</body>
</html>
